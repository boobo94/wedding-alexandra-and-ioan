<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nunta Alexandra & Ioan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blush: #c9a0a0;
        --blush-light: #e8d0d0;
        --blush-dark: #a07070;
        --cream: #fdfaf5;
        --cream-dark: #f5efe4;
        --white: #ffffff;
        --text-dark: #2a2a2a;
        --text-mid: #555555;
        --text-light: #888888;
        --gold: #b89060;
        --gold-light: rgba(184, 144, 96, 0.15);
        --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.07);
        --shadow-card: 0 2px 16px rgba(0, 0, 0, 0.06);
        --radius: 16px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background-color: var(--cream);
        color: var(--text-dark);
        overflow-x: hidden;
      }

      /* ── Hero ── */
      .hero {
        position: relative;
        height: 100svh;
        min-height: 500px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        overflow: hidden;
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.28) 0%,
            rgba(0, 0, 0, 0.18) 60%,
            rgba(0, 0, 0, 0.38) 100%
          ),
          url("https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop")
            center/cover no-repeat;
        transform: scale(1.04);
        animation: zoomIn 12s ease-out forwards;
      }

      @keyframes zoomIn {
        from {
          transform: scale(1.08);
        }
        to {
          transform: scale(1);
        }
      }

      .hero-content {
        position: relative;
        z-index: 2;
        color: var(--white);
        padding: 20px;
        animation: fadeUp 1.4s ease-out both;
      }

      .hero-eyebrow {
        font-family: "Montserrat", sans-serif;
        font-size: clamp(0.6rem, 2vw, 0.75rem);
        font-weight: 500;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.8;
        margin-bottom: 16px;
      }

      .hero-names {
        font-family: "Great Vibes", cursive;
        font-size: clamp(4rem, 14vw, 9rem);
        line-height: 1;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.25);
        margin-bottom: 20px;
      }

      .hero-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 20px;
        opacity: 0.7;
      }
      .hero-divider::before,
      .hero-divider::after {
        content: "";
        width: 60px;
        height: 1px;
        background: rgba(255, 255, 255, 0.6);
      }
      .hero-divider span {
        font-size: 1.1rem;
      }

      .hero-date {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1rem, 3.5vw, 1.5rem);
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.92;
      }

      /* ── Countdown ── */
      .countdown-section {
        background: var(--white);
        padding: 60px 20px;
        text-align: center;
        border-bottom: 1px solid var(--blush-light);
      }

      .section-label {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.1rem, 3vw, 1.4rem);
        font-weight: 300;
        font-style: italic;
        color: var(--text-mid);
        margin-bottom: 40px;
      }

      .countdown-container {
        display: flex;
        justify-content: center;
        gap: clamp(20px, 5vw, 60px);
        flex-wrap: wrap;
      }

      .countdown-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 60px;
      }

      .countdown-number {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.4rem, 7vw, 4rem);
        font-weight: 600;
        color: var(--blush-dark);
        line-height: 1;
        min-width: 2.2ch;
        text-align: center;
      }

      .countdown-label {
        font-size: 0.6rem;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-light);
        margin-top: 8px;
      }

      .countdown-sep {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2rem, 6vw, 3.5rem);
        color: var(--blush-light);
        align-self: flex-start;
        padding-top: 2px;
        line-height: 1;
      }

      /* ── Section common ── */
      .section-wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 80px 20px;
      }

      .section-heading {
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.6rem, 5vw, 2.2rem);
        font-weight: 400;
        color: var(--text-dark);
        margin-bottom: 12px;
      }

      .section-ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 60px;
      }
      .section-ornament::before,
      .section-ornament::after {
        content: "";
        flex: 1;
        max-width: 80px;
        height: 1px;
        background: var(--blush);
        opacity: 0.5;
      }
      .section-ornament span {
        color: var(--blush);
        font-size: 1rem;
      }

      /* ── Timeline ── */
      .timeline {
        position: relative;
        padding-left: 28px;
      }

      /* Mobile: left-side vertical line */
      .timeline::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 0;
        bottom: 0;
        width: 1px;
        background: linear-gradient(
          to bottom,
          transparent,
          var(--blush-light) 6%,
          var(--blush-light) 94%,
          transparent
        );
      }

      /* Mobile: dot per card on the left line */
      .event-card::before {
        content: "";
        position: absolute;
        top: 30px;
        left: -20px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--blush-light);
        border: 2px solid var(--white);
        box-shadow: 0 0 0 1px var(--blush);
        transition: background 0.3s;
        z-index: 1;
      }

      .event-card {
        position: relative;
        background: var(--white);
        border: 1px solid var(--blush-light);
        border-radius: var(--radius);
        padding: 24px 28px;
        box-shadow: var(--shadow-card);
        margin-bottom: 28px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease,
          border-color 0.3s ease;
        animation: fadeUp 0.6s ease-out both;
      }

      /* stagger animation */
      .event-card:nth-child(1) {
        animation-delay: 0.05s;
      }
      .event-card:nth-child(2) {
        animation-delay: 0.12s;
      }
      .event-card:nth-child(3) {
        animation-delay: 0.19s;
      }
      .event-card:nth-child(4) {
        animation-delay: 0.26s;
      }
      .event-card:nth-child(5) {
        animation-delay: 0.33s;
      }
      .event-card:nth-child(6) {
        animation-delay: 0.4s;
      }

      /* Desktop: centered alternating layout */
      @media (min-width: 700px) {
        /* Switch to center line */
        .timeline {
          padding-left: 0;
        }
        .timeline::before {
          left: 50%;
          transform: translateX(-50%);
        }

        .event-card {
          width: calc(50% - 36px);
          margin-bottom: 36px;
        }
        .event-card.left {
          margin-right: auto;
          text-align: right;
        }
        .event-card.right {
          margin-left: auto;
          text-align: left;
        }

        /* Remove mobile ::before dot, use ::after for center dots */
        .event-card::before {
          display: none;
        }

        .event-card::after {
          content: "";
          position: absolute;
          top: 32px;
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: var(--blush-light);
          border: 2px solid var(--white);
          box-shadow: 0 0 0 1px var(--blush);
          transition: background 0.3s;
        }
        .event-card.left::after {
          right: -41px;
        }
        .event-card.right::after {
          left: -41px;
        }
      }

      .event-card.active {
        border-color: var(--blush);
        box-shadow: 0 4px 24px rgba(180, 120, 120, 0.15);
        background: linear-gradient(135deg, #fff 0%, #fdf6f6 100%);
      }
      .event-card.active::before,
      .event-card.active::after {
        background: var(--blush) !important;
      }

      .event-badge {
        display: inline-block;
        background: var(--blush-dark);
        color: var(--white);
        font-size: 0.6rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 20px;
        margin-bottom: 12px;
      }

      .event-time {
        font-family: "Cormorant Garamond", serif;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--blush-dark);
        letter-spacing: 2px;
        text-transform: uppercase;
        display: block;
        margin-bottom: 6px;
      }

      .event-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.2rem, 3vw, 1.5rem);
        font-weight: 600;
        color: var(--text-dark);
        display: block;
        margin-bottom: 6px;
        line-height: 1.2;
      }

      .event-address {
        font-size: 0.78rem;
        color: var(--text-light);
        display: block;
        margin-bottom: 16px;
        font-weight: 400;
        line-height: 1.5;
      }

      .map-preview {
        width: 100%;
        height: 130px;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 12px;
        border: 1px solid var(--blush-light);
      }

      .map-preview iframe {
        width: 100%;
        height: 100%;
        display: block;
        filter: saturate(0.85) sepia(0.08);
      }

      .nav-label {
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-light);
        margin-bottom: 6px;
      }

      .map-links {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .parking-block {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--blush-light);
      }
      .event-card.left .map-links {
        justify-content: flex-end;
      }
      .event-card.right .map-links,
      .map-links {
        justify-content: flex-start;
      }

      @media (max-width: 699px) {
        .map-links {
          justify-content: flex-start !important;
        }
      }

      .btn-map {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 50px;
        color: var(--white);
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .btn-map:hover {
        opacity: 0.82;
        transform: translateY(-1px);
      }
      .btn-google {
        background: #4285f4;
      }
      .btn-waze {
        background: #33ccff;
        color: #1a1a1a;
      }
      .btn-apple {
        background: #1c1c1e;
      }

      /* ── Footer ── */
      footer {
        background: var(--cream-dark);
        border-top: 1px solid var(--blush-light);
        padding: 70px 20px 50px;
        text-align: center;
      }

      .footer-names {
        font-family: "Great Vibes", cursive;
        font-size: clamp(2.4rem, 8vw, 4rem);
        color: var(--blush-dark);
        margin-bottom: 12px;
      }

      .footer-note {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(0.95rem, 2.5vw, 1.15rem);
        font-weight: 300;
        font-style: italic;
        color: var(--text-mid);
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Responsive tweaks ── */
      @media (max-width: 699px) {
        .event-card {
          width: 100%;
        }
        .section-wrap {
          padding: 60px 16px;
        }
      }

      @media (max-width: 400px) {
        .countdown-sep {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- HERO -->
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <p class="hero-eyebrow">Vă invităm la nunta noastră</p>
        <h1 class="hero-names">Alexandra & Ioan</h1>
        <div class="hero-divider"><span>✦</span></div>
        <p class="hero-date">2 Mai 2026 · București</p>
      </div>
    </section>

    <!-- CIVIL CEREMONY 29 MAI -->
    <section class="section-wrap">
      <h2 class="section-heading">Cununia Civilă · 29 Mai 2026</h2>
      <div class="section-ornament"><span>✦</span></div>
      <div class="timeline" id="civil-timeline"></div>
    </section>

    <!-- COUNTDOWN -->
    <section class="countdown-section">
      <p class="section-label">Vom deveni o familie în</p>
      <div class="countdown-container" id="countdown">
        <div class="countdown-item">
          <span class="countdown-number" id="days">00</span>
          <span class="countdown-label">Zile</span>
        </div>
        <span class="countdown-sep">·</span>
        <div class="countdown-item">
          <span class="countdown-number" id="hours">00</span>
          <span class="countdown-label">Ore</span>
        </div>
        <span class="countdown-sep">·</span>
        <div class="countdown-item">
          <span class="countdown-number" id="minutes">00</span>
          <span class="countdown-label">Minute</span>
        </div>
        <span class="countdown-sep">·</span>
        <div class="countdown-item">
          <span class="countdown-number" id="seconds">00</span>
          <span class="countdown-label">Secunde</span>
        </div>
      </div>
    </section>

    <!-- TIMELINE -->
    <section class="section-wrap">
      <h2 class="section-heading">Programul Evenimentului</h2>
      <div class="section-ornament"><span>✦</span></div>
      <div class="timeline" id="timeline"></div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p class="footer-names">Alexandra & Ioan</p>
      <p class="footer-note">
        Vă mulțumim din suflet pentru că veți fi alături de noi
      </p>
    </footer>

    <script>
      const WEDDING_DATE_STR = "2026-05-02";
      const CIVIL_DATE_STR = "2026-05-29";

      const civilEvents = [
        {
          time: "12:00",
          end: "12:30",
          title: "Cununia Civilă 💍",
          address:
            "Serviciul Stare Civilă, Bulevardul Mircea Vodă 5, Sector 3, București",
          coords: "44.4313261669255,26.111797243166396",
          googleMapsUrl: "https://maps.app.goo.gl/scP8MiXJzfEJ726i9",
          maps: true,
        },
        {
          time: "12:30",
          end: "20:00",
          title: "Restaurant Haute Pepper 🥂",
          address: "Bulevardul Unirii 2, 040104 București",
          coords: "44.42696628512524,26.093270804179326",
          googleMapsUrl: "https://maps.app.goo.gl/EzFZifMV5sjPgKL28",
          maps: true,
          parkingCoords: "44.42686664004211, 26.09284108511247",
        },
      ];

      const events = [
        {
          time: "14:00",
          end: "15:30",
          title: "Cununia Religioasă 💒",
          address: "Biserica Sfântul Spiridon-Nou, București",
          coords: "44.4236173,26.1018919",
          query: "Biserica+Sfântul+Spiridon-Nou,+București",
          maps: true,
          parkingCoords: "44.424325635619766, 26.102772583023583",
        },
        {
          time: "16:00",
          end: "04:00",
          title: "Petrecere 🎉",
          address:
            "Cernica Events – Salon Arcadia, Strada Ștrandului nr. 52, Pantelimon",
          coords: "44.4363707,26.2456994",
          query: "Cernica+Events,+Pantelimon",
          maps: true,
        },
        {
          time: "00:00",
          end: "04:00",
          title: "To be continued... 🥂",
          address: "",
          maps: false,
          nextDay: true,
        },
      ];

      function renderCivilTimeline() {
        const container = document.getElementById("civil-timeline");
        const now = new Date();
        const todayStr = now.toISOString().split("T")[0];
        const isCivilDay = todayStr === CIVIL_DATE_STR;
        const currentMinutes = isCivilDay
          ? now.getHours() * 60 + now.getMinutes()
          : -1;

        container.innerHTML = "";

        civilEvents.forEach((event, index) => {
          const card = document.createElement("div");
          card.className = `event-card ${index % 2 === 0 ? "left" : "right"}`;

          const startMin = timeToMinutes(event.time);
          const endMin = timeToMinutes(event.end);

          if (
            isCivilDay &&
            currentMinutes >= startMin &&
            currentMinutes < endMin
          ) {
            card.classList.add("active");
          }

          let mapHtml = "";
          let btnHtml = "";

          if (event.maps && event.coords) {
            mapHtml = `
              <div class="map-preview">
                <iframe
                  src="https://maps.google.com/maps?q=${event.coords}&z=17&t=k&iwloc=0&output=embed"
                  frameborder="0" scrolling="no" loading="lazy"
                  title="${event.title} – hartă"></iframe>
              </div>`;
            btnHtml = `
              <p class="nav-label">Navighează cu</p>
              <div class="map-links">
                <a href="${event.googleMapsUrl}" target="_blank" rel="noopener" class="btn-map btn-google">Google Maps</a>
                <a href="https://waze.com/ul?ll=${event.coords}&navigate=yes" target="_blank" rel="noopener" class="btn-map btn-waze">Waze</a>
                <a href="http://maps.apple.com/?ll=${event.coords}" target="_blank" rel="noopener" class="btn-map btn-apple">Apple Maps</a>
              </div>`;
          }

          let parkingHtml = "";
          if (event.parkingCoords) {
            parkingHtml = `
              <div class="parking-block">
                <p class="nav-label">🅿️ Parcheaza aici:</p>
                <div class="map-links">
                  <a href="https://www.google.com/maps/search/?api=1&query=${event.parkingCoords}" target="_blank" rel="noopener" class="btn-map btn-google">Google Maps</a>
                  <a href="https://waze.com/ul?ll=${event.parkingCoords}&navigate=yes" target="_blank" rel="noopener" class="btn-map btn-waze">Waze</a>
                  <a href="http://maps.apple.com/?ll=${event.parkingCoords}&q=Parcare" target="_blank" rel="noopener" class="btn-map btn-apple">Apple Maps</a>
                </div>
              </div>`;
          }

          card.innerHTML = `
            ${card.classList.contains("active") ? '<span class="event-badge">În desfășurare</span>' : ""}
            <span class="event-time">${event.time}</span>
            <span class="event-title">${event.title}</span>
            ${event.address ? `<span class="event-address">${event.address}</span>` : ""}
            ${mapHtml}
            ${btnHtml}
            ${parkingHtml}
          `;

          container.appendChild(card);
        });
      }

      function timeToMinutes(str) {
        const [h, m] = str.split(":").map(Number);
        return h * 60 + m;
      }

      function renderTimeline() {
        const container = document.getElementById("timeline");
        const now = new Date();
        const todayStr = now.toISOString().split("T")[0];
        const isWeddingDay = todayStr === WEDDING_DATE_STR;

        const currentMinutes = isWeddingDay
          ? now.getHours() * 60 + now.getMinutes()
          : -1;

        container.innerHTML = "";

        events.forEach((event, index) => {
          const card = document.createElement("div");
          card.className = `event-card ${index % 2 === 0 ? "left" : "right"}`;

          const startMin = timeToMinutes(event.time);
          let endMin = timeToMinutes(event.end);

          // after-midnight events: end wraps past 00:00
          if (event.nextDay || (endMin <= startMin && startMin >= 18 * 60)) {
            endMin += 24 * 60;
          }

          let nowAdj = currentMinutes;
          // if current time is early morning (0–6h) and we have a nextDay event
          if (event.nextDay && currentMinutes < 6 * 60) {
            nowAdj = currentMinutes + 24 * 60;
          }

          if (isWeddingDay && nowAdj >= startMin && nowAdj < endMin) {
            card.classList.add("active");
          }

          let mapHtml = "";
          let btnHtml = "";

          if (event.maps && event.coords) {
            mapHtml = `
                        <div class="map-preview">
                            <iframe
                                src="https://maps.google.com/maps?q=${event.coords}&z=17&t=k&iwloc=0&output=embed"
                                frameborder="0" scrolling="no" loading="lazy"
                                title="${event.title} – hartă"></iframe>
                        </div>`;
            btnHtml = `
                        <p class="nav-label">Navighează cu</p>
                        <div class="map-links">
                            <a href="https://www.google.com/maps/search/?api=1&query=${event.query}" target="_blank" rel="noopener" class="btn-map btn-google">Google Maps</a>
                            <a href="https://waze.com/ul?q=${event.query}&navigate=yes" target="_blank" rel="noopener" class="btn-map btn-waze">Waze</a>
                            <a href="http://maps.apple.com/?q=${event.query}" target="_blank" rel="noopener" class="btn-map btn-apple">Apple Maps</a>
                        </div>`;
          }

          let parkingHtml = "";
          if (event.parkingCoords) {
            parkingHtml = `
              <div class="parking-block">
                <p class="nav-label">🅿️ Parcheaza aici:</p>
                <div class="map-links">
                  <a href="https://www.google.com/maps/search/?api=1&query=${event.parkingCoords}" target="_blank" rel="noopener" class="btn-map btn-google">Google Maps</a>
                  <a href="https://waze.com/ul?ll=${event.parkingCoords}&navigate=yes" target="_blank" rel="noopener" class="btn-map btn-waze">Waze</a>
                  <a href="http://maps.apple.com/?ll=${event.parkingCoords}&q=Parcare" target="_blank" rel="noopener" class="btn-map btn-apple">Apple Maps</a>
                </div>
              </div>`;
          }

          card.innerHTML = `
                    ${card.classList.contains("active") ? '<span class="event-badge">În desfășurare</span>' : ""}
                    <span class="event-time">${event.time}</span>
                    <span class="event-title">${event.title}</span>
                    ${event.address ? `<span class="event-address">${event.address}</span>` : ""}
                    ${mapHtml}
                    ${btnHtml}
                    ${parkingHtml}
                `;

          container.appendChild(card);
        });
      }

      function updateCountdown() {
        const target = new Date("2026-05-02T14:00:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;

        if (diff <= 0) {
          document.getElementById("countdown").innerHTML =
            `<p style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--blush-dark);font-style:italic;">Evenimentul a început! 🎉</p>`;
          return;
        }

        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById("days").textContent = String(d).padStart(
          2,
          "0",
        );
        document.getElementById("hours").textContent = String(h).padStart(
          2,
          "0",
        );
        document.getElementById("minutes").textContent = String(m).padStart(
          2,
          "0",
        );
        document.getElementById("seconds").textContent = String(s).padStart(
          2,
          "0",
        );
      }

      renderCivilTimeline();
      renderTimeline();
      updateCountdown();
      setInterval(updateCountdown, 1000);
      setInterval(renderTimeline, 30000);
      setInterval(renderCivilTimeline, 30000);
    </script>
  </body>
</html>
